<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediksi Kerusakan Mesin</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚙️ Prediksi <span>Kerusakan Mesin</span></h1>
            <p>Masukkan parameter mesin untuk memprediksi potensi kerusakan</p>
        </div>

        <div class="card">
            <form id="predictionForm">
                <div class="grid-2">
                    <div class="form-group">
                        <label for="air_temp">Air Temperature [K]</label>
                        <input type="range" id="air_temp_slider" min="295" max="310" step="0.1" value="298.0">
                        <div class="input-row">
                            <input type="number" id="air_temp" step="0.1" min="295" max="310" value="298.0" required>
                            <span class="range-badge">295 – 310 K</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="process_temp">Process Temperature [K]</label>
                        <input type="range" id="process_temp_slider" min="305" max="330" step="0.1" value="308.0">
                        <div class="input-row">
                            <input type="number" id="process_temp" step="0.1" min="305" max="330" value="308.0" required>
                            <span class="range-badge">305 – 330 K</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="rotational_speed">Rotational Speed [rpm]</label>
                        <input type="range" id="rotational_speed_slider" min="1000" max="3000" value="1500">
                        <div class="input-row">
                            <input type="number" id="rotational_speed" min="1000" max="3000" value="1500" required>
                            <span class="range-badge">1000 – 3000 rpm</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="torque">Torque [Nm]</label>
                        <input type="range" id="torque_slider" min="0" max="80" step="0.1" value="30.0">
                        <div class="input-row">
                            <input type="number" id="torque" step="0.1" min="0" max="80" value="30.0" required>
                            <span class="range-badge">0 – 80 Nm</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="tool_wear">Tool Wear [min]</label>
                        <input type="range" id="tool_wear_slider" min="0" max="260" value="0">
                        <div class="input-row">
                            <input type="number" id="tool_wear" min="0" max="260" value="0" required>
                            <span class="range-badge">0 – 260 min</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="type">Type</label>
                        <select id="type">
                            <option value="0">H (High)</option>
                            <option value="1" selected>L (Low)</option>
                            <option value="2">M (Medium)</option>
                        </select>
                        <div class="range-badge" style="margin-top:0.35rem">Tingkat spesifikasi mesin</div>
                    </div>
                </div>
                <button type="submit" class="btn-predict" id="submitBtn">
                    <span id="btnText">Prediksi Kerusakan</span>
                </button>
            </form>
        </div>

        <div id="errorMsg" class="error-msg hidden"></div>

        <div id="results" class="results hidden">
            <h2>Hasil Prediksi</h2>
            <div id="inputSummary" class="input-summary"></div>
            <div id="resultCards" class="result-cards"></div>
            <div class="result-note">
                <span class="tag tag-normal">Normal</span> = mesin tidak rusak,
                <span class="tag tag-rusak">Rusak</span> = berpotensi mengalami kerusakan.
            </div>
        </div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
